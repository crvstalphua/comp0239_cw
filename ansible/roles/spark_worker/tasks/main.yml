- name: Create spark group
  group: 
    name: spark
    system: true
    state: present

- name: Create spark user
  user:
    name: spark
    group: spark
    system: true
    shell: /sbin/nologin
    home: /opt/spark
    create_home: false
    state: present

- name: Create Spark install directory
  file:
    path: /opt/spark
    state: directory
    owner: spark
    group: spark
    mode: "0755"

- name: Download spark
  get_url:
    url: "https://archive.apache.org/dist/spark/spark-3.5.1/spark-3.5.1-bin-hadoop3.tgz"
    dest: /tmp/spark-3.5.1-bin-hadoop3.tgz
    mode: "0644"
    force: false

- name: Extract spark
  unarchive: 
    src: /tmp/spark-3.5.1-bin-hadoop3.tgz
    dest: /opt/spark
    remote_src: true
    extra_opts: ["--strip-components=1"]
    creates: /opt/spark/bin/spark-submit
    owner: spark
    group: spark

- name: Create spark directories
  file: 
    path: "{{ item }}"
    state: directory
    owner: spark
    group: spark
    mode: "0755"
  loop:
    - /opt/spark/logs
    - /opt/spark/pids

- name: Deploy spark-env.sh
  template:
    src: spark-env.sh.j2
    dest: /opt/spark/conf/spark-env.sh
    owner: spark
    group: spark
    mode: "0755"
  notify: Restart spark worker

- name: Install spark-worker systemd
  template:
    src: spark-worker.service.j2
    dest: /etc/systemd/system/spark-worker.service
    mode: "0644"
  notify: Restart spark worker

- name: Enable and start spark worker
  systemd:
    name: spark-worker
    state: started
    enabled: true
    daemon_reload: true

