- name: Download prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v2.51.2/prometheus-2.51.2.linux-amd64.tar.gz"
    dest: /tmp/prometheus-2.51.2.linux-amd64.tar.gz
    force: false
  
- name: Extract prometheus
  unarchive: 
    src: /tmp/prometheus-2.51.2.linux-amd64.tar.gz
    dest: /usr/local/bin
    remote_src: true
    extra_opts: ["--strip-components=1"]
    creates: /usr/local/bin/prometheus

- name: Create Prometheus directories
  file: 
    path: "{{ item }}"
    state: directory
    owner: nobody
    group: nobody
    mode: "0755"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Deploy Prometheus config
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    mode: "0644"
  notify: Restart Prometheus

- name: Deploy Prometheus systemd
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: "0644"
  notify: Restart Prometheus

- name: Enable and start Prometheus
  systemd:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: true
    